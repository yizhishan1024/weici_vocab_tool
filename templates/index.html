<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>维词抓取与生词本生成器</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <p id="todayText" class="today-text"></p>
      <button id="settingsBtn" class="settings-trigger ghost" type="button" aria-expanded="false" aria-controls="settingsDrawer">
        设置
      </button>
    </header>

    <aside id="settingsDrawer" class="settings-drawer" hidden>
      <div class="settings-head">
        <h2>设置</h2>
        <button id="settingsCloseBtn" class="ghost" type="button">关闭</button>
      </div>

      <label class="settings-option" for="autoPlayToggle">
        <div>
          <strong>自动播放单词发音</strong>
          <p>切换卡片或进入卡片模式时，自动朗读当前单词。</p>
        </div>
        <input id="autoPlayToggle" type="checkbox" />
      </label>

      <label class="settings-option" for="hideMeaningsToggle">
        <div>
          <strong>关闭释义</strong>
          <p>开启后卡片只显示单词和音标，不显示中文和英文释义。</p>
        </div>
        <input id="hideMeaningsToggle" type="checkbox" />
      </label>
    </aside>

    <main class="container">
      <section class="card hero-card">
        <div class="hero-head">
          <div>
            <h1>维词生词工具</h1>
            <p class="hint">抓取来源：1299172402/weici（docs/2）</p>
          </div>
          <div class="toolbar">
            <button id="loadBtn">加载词库</button>
            <button id="refreshBtn">强制刷新</button>
          </div>
        </div>

        <div id="homePanel" class="tile-grid">
          <button id="showStudyBtn" class="feature-tile active" type="button">
            <span class="tile-kicker">Tile 01</span>
            <strong>筛生词</strong>
            <span>按范围逐张浏览新词卡，加入或跳过。</span>
          </button>
          <button id="showNotebookBtn" class="feature-tile" type="button">
            <span class="tile-kicker">Tile 02</span>
            <strong>览生词</strong>
            <span>查看已选生词、清空列表并导出词汇本。</span>
          </button>
        </div>

        <p id="stats" class="stats-line"></p>
      </section>

      <section id="workspace" class="workspace" hidden>
        <article id="studyPanel" class="card flashcard-panel">
          <div class="flashcard-meta">
            <div class="meta-left">
              <button id="drawerToggleBtn" class="ghost drawer-toggle" type="button">目录</button>
              <h2>筛词卡片</h2>
            </div>
            <p id="progressText" class="hint">准备加载词库...</p>
          </div>

          <aside id="studyDrawer" class="study-drawer" hidden>
            <div class="drawer-head">
              <h3>筛词范围</h3>
              <button id="drawerCloseBtn" class="ghost" type="button">收起</button>
            </div>
            <div id="drawerRangeList" class="drawer-range-list"></div>

            <div class="drawer-bookmarks">
              <div class="drawer-subhead">
                <h3>书签</h3>
                <button id="bookmarkCurrentBtn" class="ghost" type="button">添加当前书签</button>
              </div>
              <div id="bookmarkList" class="bookmark-list"></div>
            </div>
          </aside>

          <div class="flashcard-wrap">
            <div class="flashcard" id="flashcard">
              <p id="emptyState" class="empty-state">当前范围内没有可显示的单词。</p>

              <div id="cardContent" class="card-content" hidden>
                <p id="cardCategory" class="card-category"></p>
                <h3 id="cardWord" class="card-word"></h3>
                <p id="cardIpa" class="card-ipa"></p>
                <div id="cardMeanings" class="card-meanings"></div>
              </div>
            </div>

            <div class="flashcard-actions">
              <button id="backHomeBtn" class="ghost">退出</button>
              <button id="playAudioBtn" class="ghost">播放发音</button>
              <button id="bookmarkBtn" class="ghost">添加书签</button>
              <button id="addBtn">加入生词本</button>
              <button id="prevBtn" class="ghost">上一个</button>
              <button id="nextBtn" class="ghost">下一个</button>
            </div>

            <p class="shortcut-hint">快捷键：`A/Enter` 加入生词本，`B` 添加书签，方向键左右切换，`Esc` 退出</p>
          </div>
        </article>

        <article id="notebookPanel" class="card notebook-panel" hidden>
          <div class="flashcard-meta">
            <h2>览生词卡片</h2>
            <p id="selectedCount" hidden>已选 0 个单词</p>
          </div>

          <div class="flashcard-wrap">
            <div class="flashcard" id="notebookFlashcard">
              <p id="notebookEmptyState" class="empty-state">当前处于生词本模式，但生词本里还没有单词。</p>

              <div id="notebookCardContent" class="card-content" hidden>
                <p id="notebookCategory" class="card-category"></p>
                <h3 id="notebookWord" class="card-word"></h3>
                <p id="notebookIpa" class="card-ipa"></p>
                <div id="notebookMeanings" class="card-meanings"></div>
              </div>
            </div>

            <div class="flashcard-actions">
              <button id="notebookExitBtn" class="ghost">退出</button>
              <button id="notebookPlayAudioBtn" class="ghost">播放发音</button>
              <button id="removeBtn" class="ghost">去除生词本</button>
              <button id="notebookPrevBtn" class="ghost">上一个</button>
              <button id="notebookNextBtn" class="ghost">下一个</button>
            </div>

            <div class="export-box compact-export">
              <select id="exportSourceSelect" aria-label="导出来源">
                <option value="notebook" selected>导出生词本</option>
                <option value="categories">按类别导出</option>
              </select>

              <select id="modeSelect" aria-label="导出模式">
                <option value="word">只含单词</option>
                <option value="zh">仅中文释义</option>
                <option value="bilingual" selected>中英双释义</option>
                <option value="en">纯英文</option>
              </select>

              <select id="typeSelect" aria-label="导出格式">
                <option value="docx" selected>DOCX 文档</option>
                <option value="txt">TXT 文本</option>
              </select>

              <button id="exportBtn">导出词汇本</button>
            </div>

            <div id="exportCategoryPanel" class="export-category-panel" hidden>
              <div class="export-category-head">
                <strong>类别词表</strong>
                <div class="export-category-actions">
                  <button id="exportSelectAllBtn" class="ghost" type="button">全选</button>
                  <button id="exportClearBtn" class="ghost" type="button">清空</button>
                </div>
              </div>
              <div id="exportCategoryList" class="export-category-list"></div>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
